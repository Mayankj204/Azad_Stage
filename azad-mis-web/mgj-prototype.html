  <style>
    :root {
      --primary: #e67e22;
      --primary-dark: #c9600c;
      --secondary: #2c3e50;
      --bg: #f4f6f8;
      --surface: #ffffff;
      --border: #e1e4e8;
      --text: #2c3e50;
      --text-light: #7f8c8d;
      --success: #27ae60;
      --danger: #e74c3c;
      --warning: #f39c12;
      --info: #3498db;
      --purple: #9b59b6;
      --radius: 8px;
      --shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; }

    /* Layout */
    .app-container { display: flex; min-height: 100vh; }
    .sidebar { width: 260px; background: #fff; border-right: 1px solid var(--border); position: fixed; top: 0; bottom: 0; left: 0; overflow-y: auto; }
    .sidebar-header { padding: 18px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
    .sidebar-header .logo { width: 36px; height: 36px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: bold; font-size: 16px; }
    .sidebar-header h1 { font-size: 15px; color: var(--secondary); font-weight: 700; }
    .sidebar-header small { display: block; font-size: 11px; color: var(--text-light); font-weight: normal; }
    .nav { padding: 12px 0; }
    .nav-section { padding: 8px 20px 4px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-light); font-weight: 600; margin-top: 8px; }
    .nav-item { padding: 10px 20px; display: flex; align-items: center; gap: 10px; cursor: pointer; color: var(--text); border-left: 3px solid transparent; transition: all 0.15s; font-size: 13px; }
    .nav-item:hover { background: #fafafa; }
    .nav-item.active { background: #fff5eb; color: var(--primary); border-left-color: var(--primary); font-weight: 600; }
    .nav-item i { width: 16px; }

    .main { flex: 1; margin-left: 260px; }
    .topbar { background: #fff; padding: 14px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; }
    .topbar .search { flex: 1; max-width: 360px; position: relative; }
    .topbar .search input { width: 100%; padding: 8px 12px 8px 34px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; }
    .topbar .search i { position: absolute; left: 12px; top: 10px; color: var(--text-light); }
    .topbar .user { display: flex; align-items: center; gap: 10px; }
    .topbar .user .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--primary); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 13px; }

    .content { padding: 24px; }
    .page { display: none; }
    .page.active { display: block; }
    .page-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; gap: 16px; flex-wrap: wrap; }
    .page-title { font-size: 22px; color: var(--secondary); font-weight: 700; }
    .page-title small { display: block; font-size: 13px; color: var(--text-light); font-weight: normal; margin-top: 2px; }
    .breadcrumb { font-size: 12px; color: var(--text-light); margin-bottom: 6px; }
    .breadcrumb a { color: var(--text-light); text-decoration: none; }
    .breadcrumb a:hover { color: var(--primary); }

    /* Buttons */
    .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; display: inline-flex; align-items: center; gap: 6px; transition: all 0.15s; text-decoration: none; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-outline { background: #fff; color: var(--text); border: 1px solid var(--border); }
    .btn-outline:hover { background: #f8f9fa; border-color: var(--text-light); }
    .btn-success { background: var(--success); color: #fff; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn-icon { padding: 6px 9px; }

    /* Cards */
    .card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; margin-bottom: 16px; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .card-title { font-size: 15px; font-weight: 600; color: var(--secondary); }

    /* Stat cards */
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: #fff; border-radius: var(--radius); padding: 18px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 14px; }
    .stat-card .icon { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #fff; flex-shrink: 0; }
    .stat-card .label { font-size: 12px; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.3px; }
    .stat-card .value { font-size: 22px; font-weight: 700; color: var(--secondary); }

    /* Tables */
    .table-wrap { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
    table.data { width: 100%; border-collapse: collapse; }
    table.data th { background: #f8f9fa; text-align: left; padding: 12px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.3px; color: var(--text-light); font-weight: 600; border-bottom: 1px solid var(--border); }
    table.data td { padding: 12px; border-bottom: 1px solid #f1f3f5; font-size: 13px; }
    table.data tr:hover td { background: #fafbfc; }
    table.data tr:last-child td { border-bottom: none; }

    /* Forms */
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 14px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 12px; color: var(--text); font-weight: 600; }
    .form-group input, .form-group select, .form-group textarea { padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; font-family: inherit; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--primary); }
    .form-group.full { grid-column: 1 / -1; }
    .req { color: var(--danger); }
    .form-actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }

    /* Badges */
    .badge { padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; display: inline-block; }
    .badge-active { background: #d4edda; color: #155724; }
    .badge-walkout { background: #f8d7da; color: #721c24; }
    .badge-leader { background: #fde3c4; color: #a45105; }
    .badge-alumni { background: #d6ecff; color: #0b5394; }
    .badge-info { background: #e0f2fe; color: #0369a1; }
    .badge-warn { background: #fff3cd; color: #856404; }

    /* Filters */
    .filter-bar { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 14px; align-items: end; }
    .filter-bar .form-group { min-width: 140px; }
    .filter-bar .form-group label { font-size: 11px; }
    .filter-bar .form-group input, .filter-bar .form-group select { padding: 6px 8px; font-size: 12px; }

    /* Tabs */
    .tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--border); margin-bottom: 16px; overflow-x: auto; }
    .tab-btn { padding: 10px 16px; border: none; background: transparent; cursor: pointer; font-size: 13px; color: var(--text-light); border-bottom: 3px solid transparent; white-space: nowrap; }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Sub-tabs (pill-style) */
    .sub-tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; background: #fff; padding: 8px; border-radius: 10px; box-shadow: var(--shadow); }
    .sub-btn { padding: 8px 16px; border: 1px solid transparent; background: transparent; cursor: pointer; font-size: 13px; color: var(--text); border-radius: 6px; white-space: nowrap; transition: all 0.15s; font-weight: 500; }
    .sub-btn:hover { background: #f8f9fa; }
    .sub-btn.active { background: var(--primary); color: #fff; }
    .sub-btn .count { display: inline-block; margin-left: 6px; padding: 1px 8px; border-radius: 10px; font-size: 11px; background: rgba(255,255,255,0.25); }
    .sub-btn:not(.active) .count { background: #f1f3f5; color: var(--text-light); }

    /* Attendance grid */
    .attendance-grid { overflow-x: auto; }
    .attendance-grid table { width: 100%; border-collapse: collapse; }
    .attendance-grid th, .attendance-grid td { padding: 8px; border: 1px solid var(--border); font-size: 13px; }
    .attendance-grid th { background: #f8f9fa; font-weight: 600; font-size: 12px; }
    .attendance-grid .status-chip { padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: 600; border: 1px solid transparent; margin-right: 3px; }
    .attendance-grid .chip-p { background: #d4edda; color: #155724; }
    .attendance-grid .chip-p.active { background: var(--success); color: #fff; }
    .attendance-grid .chip-a { background: #f8d7da; color: #721c24; }
    .attendance-grid .chip-a.active { background: var(--danger); color: #fff; }
    .attendance-grid .chip-l { background: #fff3cd; color: #856404; }
    .attendance-grid .chip-l.active { background: var(--warning); color: #fff; }

    /* Story card */
    .story-card { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; margin-bottom: 14px; border-left: 4px solid var(--primary); }
    .story-card h4 { color: var(--secondary); margin-bottom: 6px; }
    .story-card .meta { font-size: 12px; color: var(--text-light); margin-bottom: 10px; }
    .story-card .excerpt { font-size: 13px; color: var(--text); line-height: 1.6; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 100; }
    .modal-overlay.active { display: flex; }
    .modal { background: #fff; border-radius: var(--radius); padding: 24px; min-width: 400px; max-width: 90vw; max-height: 90vh; overflow-y: auto; }
    .modal h3 { margin-bottom: 16px; }
    .close-modal { cursor: pointer; color: var(--text-light); }

    /* Utility */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .empty { padding: 40px; text-align: center; color: var(--text-light); font-size: 14px; }
    .empty i { font-size: 40px; margin-bottom: 10px; display: block; color: var(--border); }

    /* Radar wrapper */
    .radar-wrap { max-width: 520px; margin: 0 auto; }

    /* Photo uploads */
    .photo-strip { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .photo-strip .photo { width: 80px; height: 80px; border-radius: 6px; background: #f1f3f5 url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="%23bbb" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>') center/30px no-repeat; border: 1px dashed #ccc; }
    .photo-upload-hint { background: #fff8f0; border: 1px dashed #f6c78e; padding: 14px; border-radius: 6px; font-size: 12px; color: #a45105; text-align: center; margin-top: 8px; }

    /* Workflow banner */
    .workflow-banner { background: linear-gradient(135deg, #fff5eb 0%, #ffe8d1 100%); border-left: 4px solid var(--primary); padding: 14px 18px; border-radius: 6px; margin-bottom: 18px; font-size: 13px; color: #a45105; display: flex; align-items: center; gap: 10px; }
    .workflow-banner i { font-size: 18px; }

    /* Pending pills */
    .pending-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--danger); display: inline-block; margin-right: 6px; }

    /* Prototype banner */
    .proto-banner { position: fixed; bottom: 12px; right: 12px; background: #1f2937; color: #fff; padding: 8px 14px; border-radius: 20px; font-size: 11px; box-shadow: 0 4px 14px rgba(0,0,0,0.2); z-index: 50; opacity: 0.9; }

  </style>
</head>

// ---- Helper ----
const $ = (id) => document.getElementById(id);
const h = (tag, props = {}, children = []) => {
  const el = document.createElement(tag);
  for (const k in props) {
    if (k === 'class') el.className = props[k];
    else if (k === 'onclick') el.onclick = props[k];
    else if (k === 'html') el.innerHTML = props[k];
    else el.setAttribute(k, props[k]);
  }
  children.forEach(c => { if (typeof c === 'string') el.appendChild(document.createTextNode(c)); else if (c) el.appendChild(c); });
  return el;
};
const esc = (s) => String(s == null ? '' : s).replace(/[<>&"]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));
const memberName = (id) => (STATE.members.find(m => m.id === id) || {}).name || '—';
const batchName = (id) => (STATE.batches.find(b => b.id === id) || {}).name || '—';
const topicName = (id) => id ? (STATE.topics.find(t => t.id === id) || {}).name || '—' : '—';
const groupName = (id) => id ? (STATE.groups.find(g => g.id === id) || {}).name || '—' : 'All groups';

// ---- Navigation ----
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    item.classList.add('active');
    render(item.dataset.page);
  });
});

function setBreadcrumb(parts) {
  return `<div class="breadcrumb">${parts.map((p, i) => i === parts.length - 1 ? esc(p) : `<a href="#">${esc(p)}</a> <span style="color:#ccc;">›</span> `).join(' ')}</div>`;
}

function render(page) {
  const pc = $('pageContent');
  if (page === 'dashboard') pc.innerHTML = pageDashboard();
  else if (page === 'participants') pc.innerHTML = pageParticipantsWrapper();
  else if (page === 'setup') pc.innerHTML = pageSetupWrapper();
  else if (page === 'activities') pc.innerHTML = pageActivitiesWrapper();
  else if (page === 'assessments') { pc.innerHTML = pageAssessments(); setTimeout(renderRadar, 50); }
  else if (page === 'fieldlog') pc.innerHTML = pageFieldLogWrapper();
  else if (page === 'reports') pc.innerHTML = pageReportsWrapper();
  else pc.innerHTML = `<div class="empty"><i class="fas fa-tools"></i> Page not found</div>`;
  window.scrollTo(0, 0);
}

// Strip the leading breadcrumb + page-header from a page() output so we can embed just the body
function stripHeader(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  const bc = tmp.querySelector(':scope > .breadcrumb'); if (bc) bc.remove();
  const ph = tmp.querySelector(':scope > .page-header'); if (ph) ph.remove();
  return tmp.innerHTML;
}

function switchSub(btn, innerPageFn, postRender) {
  btn.parentElement.querySelectorAll('.sub-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const pane = document.getElementById('subContent');
  pane.innerHTML = stripHeader(innerPageFn());
  if (postRender) setTimeout(postRender, 20);
}

function openAttendance(eventId) {
  const event = STATE.events.find(e => e.id === eventId);
  const roster = STATE.members.filter(m => m.status === 'Active' && (!event.batchId || m.batchId === event.batchId) && (!event.groupId || m.groupId === event.groupId));
  const body = `
    <h3 style="margin-bottom: 4px;">${esc(event.title)}</h3>
    <div style="font-size:12px; color:var(--text-light); margin-bottom: 14px;">
      <span class="badge badge-info">${event.type}</span> &middot; ${event.date} &middot; ${esc(batchName(event.batchId) || '—')} &middot; ${roster.length} participants
    </div>
    <div class="attendance-grid">
      <table>
        <thead><tr><th style="width:40px;">#</th><th>Enrollment</th><th>Name</th><th>Group</th><th style="width:220px;">Mark Attendance</th></tr></thead>
        <tbody>
          ${roster.map((m, i) => {
            const a = (event.attendance || {})[m.id];
            return `<tr>
              <td>${i+1}</td>
              <td>${esc(m.enroll)}</td>
              <td><b>${esc(m.name)}</b>${m.isLeader ? ' <span class="badge badge-leader">L</span>': ''}</td>
              <td>${esc(groupName(m.groupId))}</td>
              <td>
                <span class="status-chip chip-p${a === 'P' ? ' active' : ''}">P Present</span>
                <span class="status-chip chip-a${a === 'A' ? ' active' : ''}">A Absent</span>
                <span class="status-chip chip-l${a === 'L' ? ' active' : ''}">L Late</span>
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
    <div class="card" style="margin-top:14px; background: #fafbfc; padding: 14px;">
      <div style="font-size:12px; font-weight:600; margin-bottom:8px;"><i class="fas fa-camera"></i> Event Photos — soft validation</div>
      <div class="photo-strip"><div class="photo"></div><div class="photo"></div><div class="photo"></div><div class="photo"></div><div class="photo"></div><button class="btn btn-outline btn-sm" style="align-self:center;"><i class="fas fa-plus"></i> Add</button></div>
    </div>
    <div class="form-actions">
      <button class="btn btn-outline" onclick="closeModal()">Close</button>
      <button class="btn btn-primary" onclick="closeModal(); toast('Attendance saved');">Save Attendance</button>
    </div>
  `;
  openModal(body);
  // Wire chip toggles (visual only)
  setTimeout(() => {
    document.querySelectorAll('#modal .status-chip').forEach(c => c.addEventListener('click', (e) => {
      const row = e.target.closest('tr');
      row.querySelectorAll('.status-chip').forEach(x => x.classList.remove('active'));
      e.target.classList.add('active');
    }));
  }, 50);
}

function renderRadar() {
  const el = document.getElementById('radarChart');
  if (!el || !window.Chart) return;
  new Chart(el, {
    type: 'radar',
    data: {
      labels: ['Attitudes to Violence', 'Household Work', 'Voice / Assertiveness', 'Empathy', 'Gender Equality', 'Leadership'],
      datasets: [
        { label: 'Baseline (Jun 2025)', data: [2,3,2,3,2,2], borderColor: '#3498db', backgroundColor: 'rgba(52, 152, 219, 0.15)', borderWidth: 2 },
        { label: 'Midline-1 (Feb 2026)', data: [3,4,4,4,4,3], borderColor: '#e67e22', backgroundColor: 'rgba(230, 126, 34, 0.18)', borderWidth: 2 },
      ]
    },
    options: {
      responsive: true,
      scales: { r: { min: 0, max: 5, ticks: { stepSize: 1 }, pointLabels: { font: { size: 11 } } } },
      plugins: { legend: { position: 'bottom', labels: { font: { size: 11 } } } }
    }
  });
}

// ---- Utilities ----
function openModal(html) { $('modalBody').innerHTML = html; $('modal').classList.add('active'); }
function closeModal() { $('modal').classList.remove('active'); }
function goto(page) { const el = document.querySelector('.nav-item[data-page="' + page + '"]'); if (el) el.click(); }
function switchTab(btn, tabId) {
  const tabs = btn.parentElement;
  tabs.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const scope = btn.parentElement.parentElement;
  scope.querySelectorAll(':scope > .tab-content').forEach(t => t.classList.remove('active'));
  const c = document.getElementById(tabId);
  if (c) c.classList.add('active');
}
function toast(msg) {
  const t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = 'position:fixed; top:20px; right:20px; background:#10b981; color:#fff; padding:10px 18px; border-radius:6px; box-shadow:0 4px 14px rgba(0,0,0,0.15); z-index:200; font-size:13px; font-weight:500;';
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; }, 2000);
  setTimeout(() => t.remove(), 2400);
}
