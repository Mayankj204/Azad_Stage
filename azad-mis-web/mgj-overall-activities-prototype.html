  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #e67e22;
      --primary-dark: #c9600c;
      --primary-soft: #fff5eb;
      --secondary: #2c3e50;
      --bg: #f4f6f8;
      --surface: #ffffff;
      --border: #e1e4e8;
      --text: #2c3e50;
      --text-light: #7f8c8d;
      --success: #27ae60;
      --danger: #e74c3c;
      --warning: #f39c12;
      --info: #3498db;
      --purple: #9b59b6;
      --radius: 8px;
      --shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; }

    /* Layout */
    .app { display: flex; min-height: 100vh; }
    .sidebar { width: 250px; background: #fff; border-right: 1px solid var(--border); position: fixed; inset: 0 auto 0 0; overflow-y: auto; }
    .sidebar-header { padding: 18px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
    .sidebar-header .logo { width: 36px; height: 36px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: bold; font-size: 14px; }
    .sidebar-header h1 { font-size: 14px; color: var(--secondary); font-weight: 700; }
    .sidebar-header small { display: block; font-size: 11px; color: var(--text-light); font-weight: normal; }
    .nav { padding: 12px 0; }
    .nav-section { padding: 8px 20px 4px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-light); font-weight: 600; margin-top: 8px; }
    .nav-item { padding: 10px 20px; display: flex; align-items: center; gap: 10px; cursor: pointer; color: var(--text); border-left: 3px solid transparent; transition: all 0.15s; font-size: 13px; }
    .nav-item:hover { background: #fafafa; }
    .nav-item.active { background: var(--primary-soft); color: var(--primary); border-left-color: var(--primary); font-weight: 600; }
    .nav-item i { width: 16px; }
    .nav-item .pill { margin-left: auto; background: var(--danger); color: #fff; font-size: 10px; padding: 2px 7px; border-radius: 10px; }

    .main { flex: 1; margin-left: 250px; }
    .topbar { background: #fff; padding: 12px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; }
    .topbar .crumbs { font-size: 12px; color: var(--text-light); }
    .topbar .crumbs a { color: var(--text-light); text-decoration: none; }
    .topbar .user { display: flex; align-items: center; gap: 8px; }
    .topbar .user .avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--primary); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 12px; }

    .content { padding: 24px; }
    .page { display: none; }
    .page.active { display: block; }
    .page-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 18px; gap: 16px; flex-wrap: wrap; }
    .page-title { font-size: 22px; color: var(--secondary); font-weight: 700; }
    .page-title small { display: block; font-size: 13px; color: var(--text-light); font-weight: normal; margin-top: 2px; }

    /* Buttons */
    .btn { padding: 8px 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; display: inline-flex; align-items: center; gap: 6px; transition: all 0.15s; text-decoration: none; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-outline { background: #fff; color: var(--text); border: 1px solid var(--border); }
    .btn-outline:hover { background: #f8f9fa; border-color: var(--text-light); }
    .btn-success { background: var(--success); color: #fff; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn-icon { padding: 6px 9px; background: transparent; border: 1px solid transparent; cursor: pointer; color: var(--text-light); }
    .btn-icon:hover { color: var(--primary); background: #f8f9fa; }

    /* Cards */
    .card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); padding: 18px; margin-bottom: 14px; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
    .card-title { font-size: 14px; font-weight: 600; color: var(--secondary); display: flex; align-items: center; gap: 8px; }

    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 14px; margin-bottom: 20px; }
    .stat-card { background: #fff; border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 12px; }
    .stat-card .icon { width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; color: #fff; flex-shrink: 0; }
    .stat-card .label { font-size: 11px; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.3px; }
    .stat-card .value { font-size: 22px; font-weight: 700; color: var(--secondary); }

    /* Tables */
    .table-wrap { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow); overflow: auto; }
    table.data { width: 100%; border-collapse: collapse; }
    table.data th { background: #f8f9fa; text-align: left; padding: 11px 12px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.3px; color: var(--text-light); font-weight: 600; border-bottom: 1px solid var(--border); white-space: nowrap; }
    table.data td { padding: 11px 12px; border-bottom: 1px solid #f1f3f5; font-size: 13px; }
    table.data tr:hover td { background: #fafbfc; }
    table.data tr:last-child td { border-bottom: none; }

    /* Forms */
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group label { font-size: 12px; color: var(--text); font-weight: 600; }
    .form-group input, .form-group select, .form-group textarea { padding: 7px 9px; border: 1px solid var(--border); border-radius: 5px; font-size: 13px; font-family: inherit; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--primary); }
    .form-group.full { grid-column: 1 / -1; }
    .req { color: var(--danger); }
    .form-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--border); }

    /* Badges */
    .badge { padding: 3px 9px; border-radius: 12px; font-size: 11px; font-weight: 600; display: inline-block; }
    .badge-active { background: #d4edda; color: #155724; }
    .badge-draft { background: #fff3cd; color: #856404; }
    .badge-submit { background: #cfe2ff; color: #084298; }
    .badge-warn { background: #fff3cd; color: #856404; }
    .badge-info { background: #e0f2fe; color: #0369a1; }
    .badge-locked { background: #e9ecef; color: #495057; }

    /* Filters */
    .filter-bar { display: flex; flex-wrap: wrap; gap: 10px; align-items: end; margin-bottom: 12px; }
    .filter-bar .form-group { min-width: 130px; }
    .filter-bar .form-group label { font-size: 11px; }
    .filter-bar .form-group input, .filter-bar .form-group select { padding: 6px 8px; font-size: 12px; }

    /* Sidebar submenu (collapsible, parent + children) */
    .nav-parent { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 10px 20px; color: var(--text); border-left: 3px solid transparent; font-size: 13px; transition: all 0.15s; }
    .nav-parent:hover { background: #fafafa; }
    .nav-parent.expanded { background: var(--primary-soft); color: var(--primary); border-left-color: var(--primary); font-weight: 600; }
    .nav-parent .chev { margin-left: auto; transition: transform 0.15s; font-size: 11px; }
    .nav-parent.expanded .chev { transform: rotate(180deg); }
    .nav-submenu { display: none; background: #fbfbfb; border-left: 3px solid var(--primary); }
    .nav-submenu.open { display: block; }
    .nav-submenu .nav-sub-item { padding: 8px 20px 8px 50px; font-size: 12.5px; cursor: pointer; color: var(--text); transition: all 0.15s; }
    .nav-submenu .nav-sub-item:hover { background: #fff5eb; color: var(--primary); }
    .nav-submenu .nav-sub-item.active { color: var(--primary); font-weight: 600; background: #fff5eb; }

    /* Tabs (sub-tabs inside form) */
    .sub-tabs { display: flex; gap: 4px; border-bottom: 2px solid var(--border); margin-bottom: 16px; overflow-x: auto; }
    .sub-tab-btn { padding: 9px 14px; border: none; background: transparent; cursor: pointer; font-size: 13px; color: var(--text-light); border-bottom: 3px solid transparent; white-space: nowrap; margin-bottom: -2px; }
    .sub-tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }
    .sub-tab-btn .num { display: inline-block; width: 18px; height: 18px; background: var(--text-light); color: #fff; border-radius: 50%; font-size: 10px; font-weight: 600; line-height: 18px; text-align: center; margin-right: 6px; }
    .sub-tab-btn.active .num { background: var(--primary); }
    .sub-tab-content { display: none; }
    .sub-tab-content.active { display: block; }

    /* Section labels inside form (matching the colored sections of the Excel) */
    .section-band { background: #fff7e6; border-left: 4px solid var(--primary); padding: 10px 14px; border-radius: 4px; font-weight: 600; color: #8a5a14; margin: 12px 0 10px; font-size: 13px; }
    .section-band-blue { background: #e6f4ff; border-left-color: #3498db; color: #0d4a82; }
    .section-band-pink { background: #ffe6e6; border-left-color: #c0392b; color: #722; }
    .section-band-green { background: #e8f7ec; border-left-color: #27ae60; color: #15622a; }
    .section-band-purple { background: #ede4f7; border-left-color: #9b59b6; color: #4a266a; }

    /* Chip / token list */
    .chip-input { background: #fff; border: 1px solid var(--border); border-radius: 6px; padding: 6px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; min-height: 38px; }
    .chip-input input { flex: 1; min-width: 100px; border: none; outline: none; padding: 4px 6px; font-size: 13px; background: transparent; }
    .chip { background: var(--primary-soft); color: var(--primary-dark); padding: 3px 9px; border-radius: 12px; font-size: 12px; display: inline-flex; align-items: center; gap: 6px; }
    .chip i { cursor: pointer; opacity: 0.6; }
    .chip i:hover { opacity: 1; }

    /* Banner */
    .alert-banner { padding: 12px 16px; border-radius: 6px; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; font-size: 13px; }
    .alert-warn { background: #fff8eb; border-left: 4px solid var(--warning); color: #8a5a14; }
    .alert-info { background: #e6f4ff; border-left: 4px solid var(--info); color: #0d4a82; }

    /* Pivot table specific */
    .pivot-wrap { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow); overflow: auto; }
    .pivot { border-collapse: collapse; min-width: 100%; }
    .pivot th, .pivot td { border: 1px solid var(--border); padding: 7px 10px; font-size: 12px; text-align: center; }
    .pivot thead th { background: #f8f9fa; }
    .pivot th.section { text-align: left; background: var(--primary-soft); color: var(--primary-dark); font-weight: 700; }
    .pivot th.indicator { text-align: left; font-weight: 500; background: #fff; min-width: 220px; }
    .pivot td.q-end { background: #f8f9fa; font-weight: 600; }
    .pivot td.fy-total { background: #fff5eb; font-weight: 700; color: var(--primary-dark); }
    .pivot tr.section-row td, .pivot tr.section-row th { background: #fff7e6; color: #8a5a14; font-weight: 700; text-align: left; padding: 9px 10px; font-size: 12px; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 100; padding: 16px; }
    .modal-overlay.active { display: flex; }
    .modal { background: #fff; border-radius: var(--radius); width: 100%; max-width: 880px; max-height: calc(100vh - 32px); display: flex; flex-direction: column; overflow: hidden; }
    .modal-header { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex: 0 0 auto; }
    .modal-header h3 { color: var(--primary); font-size: 16px; }
    .modal-body { padding: 20px; overflow-y: auto; flex: 1 1 auto; min-height: 0; }
    .modal-footer { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; gap: 10px; flex: 0 0 auto; align-items: center; }
    .close-x { cursor: pointer; color: var(--text-light); font-size: 20px; }

    /* Detail grid */
    .detail-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px 20px; }
    .detail-item { padding: 6px 0; }
    .detail-item label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.3px; color: var(--text-light); display: block; margin-bottom: 2px; }
    .detail-item span { font-size: 14px; color: var(--text); font-weight: 500; }

    /* Prototype banner */
    .proto-banner { position: fixed; bottom: 12px; right: 12px; background: #1f2937; color: #fff; padding: 8px 14px; border-radius: 18px; font-size: 11px; box-shadow: 0 4px 14px rgba(0,0,0,0.2); z-index: 50; opacity: 0.92; }

    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    .row-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px; }

    .empty { padding: 36px; text-align: center; color: var(--text-light); }
    .empty i { font-size: 32px; opacity: 0.4; display: block; margin-bottom: 8px; }
  </style>
</head>

function toast(msg, kind) {
  const t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = 'position:fixed;top:20px;right:20px;background:'+(kind==='warn'?'#f39c12':'#10b981')+';color:#fff;padding:10px 18px;border-radius:6px;box-shadow:0 4px 14px rgba(0,0,0,0.15);z-index:200;font-size:13px;font-weight:500;';
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; }, 2200);
  setTimeout(() => t.remove(), 2700);
}

function qSnapshot(q) {
  const rows = ENTRIES.filter(e => mQuarter(e.month) === q);
  if (!rows.length) return '<div style="color:#999;padding:14px 0;">No entries yet for this quarter.</div>';
  const sum = (k) => rows.reduce((s, e) => s + (e[k] || 0), 0);
  const items = [
    ['Pakhwada Conducted', sum('pakhwada_conducted')],
    ['Direct Participants', sum('pakhwada_direct')],
    ['Sports Sessions', sum('sports_sessions')],
    ['HH Visits', sum('hh_visits')],
    ['Community Meetings', sum('parent_meeting_total')],
    ['Assignments Completed', sum('assignments_completed')],
    ['WWW Enrollments', sum('www_enrollments')],
    ['Leader Comm. Actions', sum('leader_community_actions')],
  ];
  return '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;">' +
    items.map(([k, v]) => '<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px dashed #eee;font-size:13px;"><span style="color:#555;">' + esc(k) + '</span><strong>' + v + '</strong></div>').join('') +
    '</div>';
}

function topicFreq() {
  const map = {};
  ENTRIES.forEach(e => (e.topics_pakhwada || []).forEach(t => map[t] = (map[t] || 0) + 1));
  return Object.entries(map).map(([name, count]) => ({ name, count })).sort((a, b) => b.count - a.count);
}

// ==== Chip input helpers ====
let _chipBuffers = {};
function chipInputHtml(field, items, suggestions) {
  _chipBuffers[field] = (items || []).slice();
  const id = 'chip_' + field;
  return `<div class="chip-input" id="${id}">
    ${(items || []).map(t => '<span class="chip">' + esc(t) + ' <i class="fas fa-times" onclick="removeChip(\'' + field + '\', \'' + esc(t).replace(/\\/g,'\\\\').replace(/'/g,"\\'") + '\')"></i></span>').join('')}
    <input list="dl_${field}" placeholder="Type and press Enter" onkeydown="handleChipKey(event, '${field}')">
    ${suggestions && suggestions.length ? '<datalist id="dl_' + field + '">' + suggestions.map(s => '<option value="' + esc(s) + '">').join('') + '</datalist>' : ''}
  </div>`;
}
function handleChipKey(ev, field) {
  if (ev.key === 'Enter' || ev.key === ',') {
    ev.preventDefault();
    const v = ev.target.value.trim();
    if (v) { _chipBuffers[field] = _chipBuffers[field] || []; _chipBuffers[field].push(v); ev.target.value = ''; rerenderChips(field); }
  }
}
function removeChip(field, val) {
  _chipBuffers[field] = (_chipBuffers[field] || []).filter(x => x !== val);
  rerenderChips(field);
}
function rerenderChips(field) {
  const wrap = document.getElementById('chip_' + field);
  if (!wrap) return;
  const input = wrap.querySelector('input');
  const dl = wrap.querySelector('datalist');
  wrap.innerHTML = (_chipBuffers[field] || []).map(t => '<span class="chip">' + esc(t) + ' <i class="fas fa-times" onclick="removeChip(\'' + field + '\', \'' + esc(t).replace(/\\/g,'\\\\').replace(/'/g,"\\'") + '\')"></i></span>').join('');
  wrap.appendChild(input);
  if (dl) wrap.appendChild(dl);
  input.focus();
}
